build:
  name: Production Android build
  steps:
    - eas/checkout
    - run:
        name: Upgrade pnpm to compatible version
        command: npm install -g pnpm@10.26.1
    - run:
        name: Install dependencies
        working_directory: ../..
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Run Expo prebuild
        command: CI=1 npx expo prebuild --platform android --skip-dependency-update
    - run:
        name: Reinstall after prebuild
        working_directory: ../..
        command: pnpm install --no-frozen-lockfile
    - eas/run_gradle
