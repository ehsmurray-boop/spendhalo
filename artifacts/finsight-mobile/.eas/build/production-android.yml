build:
  name: Production Android build
  steps:
    - eas/checkout
    - run:
        name: Upgrade pnpm to compatible version
        command: npm install -g pnpm@10.26.1
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Run Expo prebuild
        working_directory: artifacts/finsight-mobile
        command: npx expo prebuild --platform android --non-interactive
    - run:
        name: Reinstall after prebuild
        command: pnpm install --no-frozen-lockfile
    - eas/run_gradle
