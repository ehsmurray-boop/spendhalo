kind = "mobile"
previewPath = "/mobile/"
title = "FinSight Mobile"
version = "1.0.0"
id = "artifacts/finsight-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26151

[services.development]
run = "pnpm --filter @workspace/finsight-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finsight-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/finsight-mobile", "run", "serve" ]

[services.env]
PORT = "26151"
BASE_PATH = "/mobile/"
